<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Форма</title>
</head>
<body>
<h1>Регистрация</h1>
<p>Уже есть аккаунт? <a href="#">Войти</a></p>
<form action="#">
	<div>
		<label for="company">
			<input type="text" placeholder="Ваша компания">
		</label>
	</div>
	<div>
		<label for="name">
			<input type="text" placeholder="Имя фамилия">
		</label>
	</div>
	<div>
		<label for="email">
			<input type="email" name="email" id="email" placeholder="E-mail">
		</label>
	</div>

	<button type="submit">Зарегистрироваться <img src="" alt=""></button>
	<div>
		<input type="checkbox" name="condition" id="condition">
		<label for="condition">Я прочитал и принимаю <a href="#">Условия использования</a></label>
	</div>
</form>
</body>
</html>
